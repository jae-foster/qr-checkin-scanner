<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>QR Check-In Scanner</title>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 16px;
      background: #f7f7f7;
    }
    #reader {
      max-width: 420px;
      margin: 20px auto;
      background: white;
      padding: 12px;
      border-radius: 12px;
    }
    #status, #confirmBox {
      max-width: 420px;
      margin: 16px auto;
      padding: 14px;
      border-radius: 12px;
      font-size: 18px;
      font-weight: bold;
      min-height: 28px;
      box-sizing: border-box;
    }
    .neutral { background: #e9eefb; color: #1f3b7a; }
    .success { background: #dff6e3; color: #176b2c; }
    .error { background: #fde2e2; color: #9f1d1d; }
    .hidden { display: none; }

    .btn-wrap {
      margin-top: 12px;
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
    }
    button {
      font-size: 16px;
      padding: 10px 18px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
    }
    .confirm-btn {
      background: #176b2c;
      color: white;
    }
    .cancel-btn {
      background: #9f1d1d;
      color: white;
    }
  </style>
</head>
<body>
  <h2>QR Check-In Scanner</h2>

  <div id="status" class="neutral">Point the camera at a QR code</div>

  <div id="confirmBox" class="neutral hidden">
    <div id="confirmText"></div>
    <div class="btn-wrap">
      <button class="confirm-btn" id="confirmBtn">Confirm Check-In</button>
      <button class="cancel-btn" id="cancelBtn">Cancel</button>
    </div>
  </div>

  <div id="reader"></div>

  <script>
    const APPS_SCRIPT_URL = "PASTE_YOUR_APPS_SCRIPT_URL_HERE";

    const statusBox = document.getElementById("status");
    const confirmBox = document.getElementById("confirmBox");
    const confirmText = document.getElementById("confirmText");
    const confirmBtn = document.getElementById("confirmBtn");
    const cancelBtn = document.getElementById("cancelBtn");

    let scanner;
    let busy = false;
    let pendingCode = "";

    function setStatus(message, type) {
      statusBox.textContent = message;
      statusBox.className = type;
    }

    function showConfirm(name, code) {
      confirmText.textContent = `Check in ${name}?`;
      confirmBox.className = "neutral";
      confirmBox.classList.remove("hidden");
      pendingCode = code;
    }

    function hideConfirm() {
      confirmBox.className = "neutral hidden";
      pendingCode = "";
    }

    async function resumeScanning(delay = 1200) {
      setTimeout(async () => {
        try {
          hideConfirm();
          await scanner.resume();
          setStatus("Point the camera at a QR code", "neutral");
        } catch (e) {
          setStatus("Scanner could not resume", "error");
        }
        busy = false;
      }, delay);
    }

    async function startScanner() {
      scanner = new Html5Qrcode("reader");

      try {
        const cameras = await Html5Qrcode.getCameras();
        if (!cameras || cameras.length === 0) {
          setStatus("No camera found on this device", "error");
          return;
        }

        let cameraId = cameras[0].id;
        const rear = cameras.find(c =>
          (c.label || "").toLowerCase().includes("back") ||
          (c.label || "").toLowerCase().includes("rear") ||
          (c.label || "").toLowerCase().includes("environment")
        );
        if (rear) cameraId = rear.id;

        await scanner.start(
          cameraId,
          { fps: 10, qrbox: 250 },
          onScanSuccess,
          () => {}
        );

        setStatus("Point the camera at a QR code", "neutral");
      } catch (err) {
        setStatus("Camera could not start. Check browser camera permissions.", "error");
      }
    }

    async function lookupCode(code) {
      const response = await fetch(
        APPS_SCRIPT_URL + "?mode=lookup&code=" + encodeURIComponent(code)
      );
      return await response.json();
    }

    async function checkInCode(code) {
      const response = await fetch(
        APPS_SCRIPT_URL + "?mode=checkin&code=" + encodeURIComponent(code)
      );
      return await response.json();
    }

    async function onScanSuccess(decodedText) {
      if (busy) return;
      busy = true;

      try {
        await scanner.pause(true);

        const result = await lookupCode(decodedText);

        if (result.success) {
          showConfirm(result.name, decodedText);
          setStatus("Please confirm check-in", "neutral");
        } else {
          if (result.name) {
            setStatus(result.error + " (" + result.name + ")", "error");
          } else {
            setStatus(result.error, "error");
          }
          await resumeScanning(1800);
        }

      } catch (err) {
        setStatus("Could not connect to Google Sheets", "error");
        await resumeScanning(1800);
      }
    }

    confirmBtn.addEventListener("click", async () => {
      if (!pendingCode) return;

      try {
        const result = await checkInCode(pendingCode);

        if (result.success) {
          setStatus("Checked in: " + result.name, "success");
        } else if (result.name) {
          setStatus(result.error + " (" + result.name + ")", "error");
        } else {
          setStatus(result.error, "error");
        }
      } catch (err) {
        setStatus("Could not complete check-in", "error");
      }

      await resumeScanning(1800);
    });

    cancelBtn.addEventListener("click", async () => {
      setStatus("Check-in cancelled", "error");
      await resumeScanning(1000);
    });

    startScanner();
  </script>
</body>
</html>
