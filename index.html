<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Student Check-In</title>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    * {
      box-sizing: border-box;
    }

    :root {
      --navy: #14213d;
      --navy-dark: #0b1730;
      --orange: #f28c28;
      --orange-dark: #dc7b19;
      --bg-light: #f4f7fb;
      --white: #ffffff;
      --text: #14213d;
      --muted: #64748b;
      --border: #d9e2ec;
      --success-bg: #ecfdf3;
      --success-text: #166534;
      --error-bg: #fef2f2;
      --error-text: #b91c1c;
      --warning-bg: #fff7ed;
      --warning-text: #c2410c;
      --shadow: 0 20px 50px rgba(20, 33, 61, 0.14);
      --radius-xl: 28px;
      --radius-lg: 20px;
      --radius-md: 14px;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      min-height: 100vh;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(242, 140, 40, 0.18), transparent 24%),
        radial-gradient(circle at top right, rgba(255,255,255,0.08), transparent 22%),
        linear-gradient(135deg, var(--navy), var(--navy-dark));
    }

    .auth-overlay,
    .overlay {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: rgba(8, 12, 24, 0.72);
      z-index: 9999;
      backdrop-filter: blur(6px);
    }

    .auth-overlay {
      display: flex;
    }

    .auth-card {
      width: 100%;
      max-width: 460px;
      background: var(--white);
      border-radius: var(--radius-xl);
      padding: 34px 28px;
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.24);
      border-top: 10px solid var(--orange);
      text-align: center;
    }

    .auth-card h2 {
      margin: 0 0 12px;
      font-size: 2rem;
      color: var(--navy);
    }

    .auth-card p {
      margin: 0 0 18px;
      color: var(--muted);
      line-height: 1.5;
    }

    .auth-input,
    .search-input {
      width: 100%;
      padding: 15px 16px;
      font-size: 16px;
      border: 2px solid var(--border);
      border-radius: 12px;
      outline: none;
      transition: 0.2s ease;
      background: #fff;
    }

    .auth-input:focus,
    .search-input:focus {
      border-color: var(--orange);
      box-shadow: 0 0 0 4px rgba(242, 140, 40, 0.12);
    }

    .auth-btn {
      width: 100%;
      margin-top: 12px;
      padding: 15px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--orange), var(--orange-dark));
      color: var(--white);
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: transform 0.15s ease, opacity 0.15s ease;
    }

    .auth-btn:hover {
      opacity: 0.96;
    }

    .auth-btn:active {
      transform: scale(0.99);
    }

    .auth-error {
      min-height: 22px;
      margin-top: 10px;
      color: var(--error-text);
      font-size: 14px;
    }

    .page {
      max-width: 1100px;
      margin: 0 auto;
      padding: 30px 20px 36px;
    }

    .hero {
      text-align: center;
      color: var(--white);
      margin-bottom: 22px;
    }

    .hero h1 {
      margin: 0;
      font-size: 2.8rem;
      font-weight: bold;
      letter-spacing: 0.2px;
    }

    .hero p {
      margin: 12px 0 0;
      font-size: 1.12rem;
      color: #dbe7ff;
    }

    .main-card {
      background: rgba(255,255,255,0.97);
      border-radius: 30px;
      padding: 30px;
      box-shadow: var(--shadow);
      border-top: 12px solid var(--orange);
    }

    .main-instruction {
      margin: 0;
      text-align: center;
      font-size: 2.4rem;
      font-weight: bold;
      color: var(--navy);
    }

    .sub-instruction {
      margin: 10px 0 24px;
      text-align: center;
      font-size: 1.08rem;
      color: var(--muted);
    }

    .status {
      padding: 16px 18px;
      border-radius: 14px;
      text-align: center;
      font-weight: bold;
      margin-bottom: 18px;
      font-size: 1.08rem;
      border: 2px solid transparent;
      transition: 0.2s ease;
    }

    .status.neutral {
      background: #eef4ff;
      color: #1d4ed8;
      border-color: #c9dcff;
    }

    .status.loading {
      background: var(--warning-bg);
      color: var(--warning-text);
      border-color: #fed7aa;
    }

    .status.success {
      background: var(--success-bg);
      color: var(--success-text);
      border-color: #bbf7d0;
    }

    .status.error {
      background: var(--error-bg);
      color: var(--error-text);
      border-color: #fecaca;
    }

    .scanner-shell {
      padding: 16px;
      border-radius: 24px;
      background:
        linear-gradient(180deg, #fffaf5, #f8fbff);
      border: 2px solid #ebf0f6;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.65);
    }

    #reader {
      width: 100%;
      min-height: 520px;
      border-radius: 22px;
      overflow: hidden;
      border: 3px solid #e5ebf3;
      background: #f8fafc;
      box-shadow: inset 0 0 0 1px rgba(20, 33, 61, 0.03);
    }

    .trouble-wrap {
      text-align: center;
      margin-top: 18px;
    }

    .trouble-btn {
      background: none;
      border: none;
      color: var(--navy);
      font-size: 15px;
      cursor: pointer;
      text-decoration: underline;
      font-weight: bold;
    }

    .search-panel {
      display: none;
      margin-top: 14px;
      padding: 16px;
      background: #f8fafc;
      border: 2px solid #e6ebf2;
      border-radius: 16px;
      animation: fadeIn 0.18s ease;
    }

    .search-panel.show {
      display: block;
    }

    .search-results {
      margin-top: 12px;
      max-height: 240px;
      overflow-y: auto;
    }

    .result-item {
      width: 100%;
      text-align: left;
      background: var(--white);
      border: 2px solid #e5e7eb;
      border-radius: 14px;
      padding: 13px 14px;
      margin-bottom: 8px;
      cursor: pointer;
      transition: 0.15s ease;
    }

    .result-item:hover {
      border-color: #cbd5e1;
      background: #fafafa;
      transform: translateY(-1px);
    }

    .result-name {
      font-weight: bold;
      margin-bottom: 4px;
      color: var(--navy);
      font-size: 1rem;
    }

    .result-meta {
      font-size: 13px;
      color: var(--muted);
    }

    .result-badge {
      display: inline-block;
      margin-top: 7px;
      padding: 4px 8px;
      border-radius: 999px;
      background: var(--error-bg);
      color: var(--error-text);
      font-size: 11px;
      font-weight: bold;
    }

    .simple-help {
      margin-top: 22px;
      text-align: center;
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.6;
    }

    .overlay.show {
      display: flex;
      animation: fadeIn 0.18s ease;
    }

    .popup {
      width: min(92vw, 900px);
      min-height: 68vh;
      background: var(--white);
      border-radius: 34px;
      box-shadow: 0 30px 70px rgba(0,0,0,0.28);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 42px 30px;
      border-top: 16px solid var(--orange);
      animation: popIn 0.2s ease;
    }

    .popup.success {
      background: linear-gradient(180deg, #f6fff9, #ecfdf3);
    }

    .popup.error {
      background: linear-gradient(180deg, #fff8f8, #fef2f2);
    }

    .popup.loading {
      background: linear-gradient(180deg, #fffaf2, #fff7ed);
    }

    .popup-icon {
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 120px;
    }

    .popup-icon.success,
    .popup-icon.error {
      font-size: 20rem;
      line-height: 1;
      font-weight: bold;
    }

    .popup.success .popup-icon {
      color: var(--success-text);
    }

    .popup.error .popup-icon {
      color: var(--error-text);
    }

    .spinner-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
    }

    .spinner {
      width: 86px;
      height: 86px;
      border-radius: 50%;
      border: 8px solid rgba(242, 140, 40, 0.18);
      border-top-color: var(--orange);
      animation: spin 0.9s linear infinite;
    }

    .spinner-glow {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: rgba(242, 140, 40, 0.14);
      filter: blur(10px);
      margin-top: -8px;
    }

    .popup-title {
      font-size: 4rem;
      font-weight: bold;
      margin: 0 0 14px;
      color: var(--navy);
      line-height: 1.05;
    }

    .popup-name {
      font-size: 2.6rem;
      font-weight: bold;
      color: var(--navy);
      margin: 0 0 18px;
      line-height: 1.2;
      max-width: 95%;
      word-break: break-word;
    }

    .popup-message {
      font-size: 2.2rem;
      font-weight: bold;
      color: var(--navy);
      margin: 0 0 18px;
      line-height: 1.25;
      max-width: 95%;
    }

    .popup.success .popup-message {
      color: var(--success-text);
    }

    .popup.error .popup-message {
      color: var(--error-text);
    }

    .countdown {
      font-size: 1.35rem;
      color: var(--muted);
      margin-top: 10px;
      font-weight: bold;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes popIn {
      from {
        opacity: 0;
        transform: translateY(10px) scale(0.98);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @media (max-width: 900px) {
      .hero h1 {
        font-size: 2.2rem;
      }

      .main-instruction {
        font-size: 2rem;
      }

      #reader {
        min-height: 420px;
      }

      .popup {
        min-height: 62vh;
        padding: 30px 22px;
      }

      .popup-icon.success,
      .popup-icon.error {
        font-size: 6rem;
      }

      .popup-title {
        font-size: 2.8rem;
      }

      .popup-name {
        font-size: 2rem;
      }

      .popup-message {
        font-size: 1.7rem;
      }

      .countdown {
        font-size: 1.1rem;
      }
    }
  </style>
</head>
<body>
  <div id="authOverlay" class="auth-overlay">
    <div class="auth-card">
      <h2>Student Check-In</h2>
      <p>Enter the password to open the scanner.</p>
      <input
        id="authInput"
        class="auth-input"
        type="password"
        placeholder="Enter password"
        autocomplete="current-password"
      />
      <div id="authError" class="auth-error"></div>
      <button id="authBtn" class="auth-btn">Enter</button>
    </div>
  </div>

  <div class="page">
    <div class="hero">
      <h1>Student Self Check-In</h1>
    </div>

    <div class="main-card">
      <h2 class="main-instruction">Scan your QR code</h2>
      <p class="sub-instruction">Hold your QR code in front of the camera.</p>

      <div id="status" class="status neutral">Point your QR code at the camera</div>

      <div class="scanner-shell">
        <div id="reader"></div>
      </div>

      <div class="trouble-wrap">
        <button id="toggleSearchBtn" class="trouble-btn">Having trouble?</button>
      </div>

      <div id="searchPanel" class="search-panel">
        <input
          id="searchInput"
          class="search-input"
          type="text"
          placeholder="Search student name or code"
          autocomplete="off"
        />
        <div id="searchResults" class="search-results"></div>
      </div>

      <div class="simple-help">
        If your QR code does not work, please see a teacher.
      </div>
    </div>
  </div>

  <div id="overlay" class="overlay">
    <div id="popupBox" class="popup loading">
      <div id="popupIcon" class="popup-icon">
        <div class="spinner-wrap">
          <div class="spinner"></div>
          <div class="spinner-glow"></div>
        </div>
      </div>
      <h2 id="popupTitle" class="popup-title">Checking In</h2>
      <div id="popupName" class="popup-name" style="display:none;"></div>
      <div id="popupMessage" class="popup-message">Please wait...</div>
      <div id="countdown" class="countdown" style="display:none;"></div>
    </div>
  </div>

  <script>
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyRvVYUupmFYA_TqdlGwgUdpOD1vGUYV42cGplkoM8DE49kfJ0j9yDNT1Xc75sJag/exec";
    const PAGE_PASSWORD = "Chatswood1";
    const SUCCESS_CLOSE_SECONDS = 5;
    const ERROR_CLOSE_SECONDS = 5;

    const authOverlay = document.getElementById("authOverlay");
    const authInput = document.getElementById("authInput");
    const authBtn = document.getElementById("authBtn");
    const authError = document.getElementById("authError");

    const statusBox = document.getElementById("status");
    const overlay = document.getElementById("overlay");
    const popupBox = document.getElementById("popupBox");
    const popupIcon = document.getElementById("popupIcon");
    const popupTitle = document.getElementById("popupTitle");
    const popupName = document.getElementById("popupName");
    const popupMessage = document.getElementById("popupMessage");
    const countdownEl = document.getElementById("countdown");

    const toggleSearchBtn = document.getElementById("toggleSearchBtn");
    const searchPanel = document.getElementById("searchPanel");
    const searchInput = document.getElementById("searchInput");
    const searchResults = document.getElementById("searchResults");

    let scanner;
    let busy = false;
    let searchTimer;
    let countdownInterval;

    function isAuthenticated() {
      return sessionStorage.getItem("scanner_auth") === "true";
    }

    function unlockPage() {
      authOverlay.style.display = "none";
      if (!scanner) startScanner();
    }

    if (isAuthenticated()) {
      unlockPage();
    }

    authBtn.addEventListener("click", () => {
      const value = authInput.value.trim();

      if (value === PAGE_PASSWORD) {
        sessionStorage.setItem("scanner_auth", "true");
        unlockPage();
      } else {
        authError.textContent = "Incorrect password";
      }
    });

    authInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") authBtn.click();
    });

    function setStatus(message, type = "neutral") {
      statusBox.textContent = message;
      statusBox.className = `status ${type}`;
    }

    function showOverlay() {
      overlay.classList.add("show");
    }

    function hideOverlay() {
      overlay.classList.remove("show");
      clearInterval(countdownInterval);
      countdownEl.style.display = "none";
      popupName.style.display = "none";
    }

    function startCountdown(seconds) {
      clearInterval(countdownInterval);
      let remaining = seconds;
      countdownEl.style.display = "block";
      countdownEl.textContent = `Closing in ${remaining} seconds`;

      countdownInterval = setInterval(() => {
        remaining -= 1;
        if (remaining <= 0) {
          clearInterval(countdownInterval);
          countdownEl.textContent = "Closing...";
        } else {
          countdownEl.textContent = `Closing in ${remaining} seconds`;
        }
      }, 1000);
    }

    function setLoadingPopup() {
      popupBox.className = "popup loading";
      popupIcon.innerHTML = `
        <div class="spinner-wrap">
          <div class="spinner"></div>
          <div class="spinner-glow"></div>
        </div>
      `;
      popupTitle.textContent = "Checking In";
      popupName.style.display = "none";
      popupMessage.textContent = "Please wait...";
      countdownEl.style.display = "none";
      showOverlay();
    }

    function setSuccessPopup(name) {
      popupBox.className = "popup success";
      popupIcon.textContent = "✓";
      popupTitle.textContent = "Checked In";
      popupName.textContent = name;
      popupName.style.display = "block";
      popupMessage.textContent = "Sit down in the seating area";
      showOverlay();
      startCountdown(SUCCESS_CLOSE_SECONDS);
    }

    function setErrorPopup(title, nameOrMessage, message) {
      popupBox.className = "popup error";
      popupIcon.textContent = "!";
      popupTitle.textContent = title;

      if (nameOrMessage) {
        popupName.textContent = nameOrMessage;
        popupName.style.display = "block";
      } else {
        popupName.style.display = "none";
      }

      popupMessage.textContent = message;
      showOverlay();
      startCountdown(ERROR_CLOSE_SECONDS);
    }

    async function resumeScanning(delayMs) {
      setTimeout(async () => {
        try {
          hideOverlay();
          await scanner.resume();
          setStatus("Point the camera at a QR code", "neutral");
        } catch (e) {
          setStatus("Scanner could not resume", "error");
        }
        busy = false;
      }, delayMs);
    }

    async function startScanner() {
      scanner = new Html5Qrcode("reader");

      try {
        const cameras = await Html5Qrcode.getCameras();
        if (!cameras || cameras.length === 0) {
          setStatus("No camera found on this device", "error");
          return;
        }

        let cameraId = cameras[0].id;
        const rear = cameras.find(c =>
          (c.label || "").toLowerCase().includes("back") ||
          (c.label || "").toLowerCase().includes("rear") ||
          (c.label || "").toLowerCase().includes("environment")
        );
        if (rear) cameraId = rear.id;

        await scanner.start(
          cameraId,
          { fps: 10, qrbox: 300 },
          onScanSuccess,
          () => {}
        );

        setStatus("Point the camera at a QR code", "neutral");
      } catch (err) {
        setStatus("Camera could not start. Check browser camera permissions.", "error");
      }
    }

    async function lookupCode(code) {
      const response = await fetch(
        APPS_SCRIPT_URL + "?mode=lookup&code=" + encodeURIComponent(code)
      );
      return await response.json();
    }

    async function checkInCode(code) {
      const response = await fetch(
        APPS_SCRIPT_URL + "?mode=checkin&code=" + encodeURIComponent(code)
      );
      return await response.json();
    }

    async function searchStudents(query) {
      const response = await fetch(
        APPS_SCRIPT_URL + "?mode=search&query=" + encodeURIComponent(query)
      );
      return await response.json();
    }

    function renderSearchResults(results) {
      if (!results || results.length === 0) {
        searchResults.innerHTML = '<div style="padding:10px;color:#64748b;font-size:14px;">No matches found</div>';
        return;
      }

      searchResults.innerHTML = results.map(student => `
        <button class="result-item" onclick="selectStudentFromSearch('${student.code.replace(/'/g, "\\'")}', '${student.name.replace(/'/g, "\\'")}', ${student.checkedIn})">
          <div class="result-name">${student.name}</div>
          <div class="result-meta">${student.code}</div>
          ${student.checkedIn ? '<div class="result-badge">Already checked in</div>' : ''}
        </button>
      `).join("");
    }

    async function processAutomaticCheckIn(code) {
      try {
        setStatus("Checking code...", "loading");
        setLoadingPopup();

        const lookup = await lookupCode(code);

        if (!lookup.success) {
          setStatus(
            lookup.error === "Code not recognised" ? "Please see a teacher." : lookup.error,
            "error"
          );

          if (lookup.error === "Code not recognised") {
            setErrorPopup("Please See a Teacher", "", "This QR code could not be recognised.");
          } else if (lookup.error === "Already checked in") {
            setErrorPopup("Already Checked In", lookup.name || "", "Please see a teacher if this is incorrect.");
          } else {
            setErrorPopup("Unable to Check In", lookup.name || "", "Please see a teacher.");
          }

          await resumeScanning(ERROR_CLOSE_SECONDS * 1000);
          return;
        }

        const result = await checkInCode(code);

        if (result.success) {
          setStatus("Checked in: " + result.name, "success");
          setSuccessPopup(result.name);
          await resumeScanning(SUCCESS_CLOSE_SECONDS * 1000);
        } else {
          setStatus(
            result.error === "Code not recognised" ? "Please see a teacher." : result.error,
            "error"
          );

          if (result.error === "Already checked in") {
            setErrorPopup("Already Checked In", result.name || "", "Please see a teacher if this is incorrect.");
          } else if (result.error === "Code not recognised") {
            setErrorPopup("Please See a Teacher", "", "This QR code could not be recognised.");
          } else {
            setErrorPopup("Unable to Check In", result.name || "", "Please see a teacher.");
          }

          await resumeScanning(ERROR_CLOSE_SECONDS * 1000);
        }
      } catch (err) {
        setStatus("Could not connect", "error");
        setErrorPopup("Please See a Teacher", "", "There was a connection problem.");
        await resumeScanning(ERROR_CLOSE_SECONDS * 1000);
      }
    }

    async function onScanSuccess(decodedText) {
      if (busy) return;
      busy = true;

      try {
        await scanner.pause(true);
      } catch (e) {}

      await processAutomaticCheckIn(decodedText);
    }

    window.selectStudentFromSearch = async function(code, name, checkedIn) {
      if (busy) return;
      busy = true;

      try {
        await scanner.pause(true);
      } catch (e) {}

      searchPanel.classList.remove("show");
      searchInput.value = "";
      searchResults.innerHTML = "";

      if (checkedIn) {
        setStatus(`Already checked in (${name})`, "error");
        setErrorPopup("Already Checked In", name, "Please see a teacher if this is incorrect.");
        await resumeScanning(ERROR_CLOSE_SECONDS * 1000);
        return;
      }

      await processAutomaticCheckIn("STUCODE:" + code);
    };

    toggleSearchBtn.addEventListener("click", () => {
      searchPanel.classList.toggle("show");
      if (searchPanel.classList.contains("show")) {
        setTimeout(() => searchInput.focus(), 100);
      } else {
        searchInput.value = "";
        searchResults.innerHTML = "";
      }
    });

    searchInput.addEventListener("input", () => {
      clearTimeout(searchTimer);

      const query = searchInput.value.trim();

      if (!query) {
        searchResults.innerHTML = "";
        return;
      }

      searchTimer = setTimeout(async () => {
        searchResults.innerHTML = '<div style="padding:10px;color:#64748b;font-size:14px;">Loading...</div>';

        try {
          const result = await searchStudents(query);
          if (result.success) {
            renderSearchResults(result.results);
          } else {
            searchResults.innerHTML = `<div style="padding:10px;color:#991b1b;font-size:14px;">${result.error}</div>`;
          }
        } catch (err) {
          searchResults.innerHTML = '<div style="padding:10px;color:#991b1b;font-size:14px;">Search failed</div>';
        }
      }, 250);
    });
  </script>
</body>
</html>
