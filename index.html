<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>QR Check-In Scanner</title>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 16px;
      background: #f7f7f7;
      margin: 0;
    }

    #reader {
      max-width: 420px;
      margin: 20px auto;
      background: white;
      padding: 12px;
      border-radius: 12px;
    }

    #status {
      max-width: 420px;
      margin: 16px auto;
      padding: 14px;
      border-radius: 12px;
      font-size: 18px;
      font-weight: bold;
      min-height: 28px;
      box-sizing: border-box;
    }

    .neutral { background: #e9eefb; color: #1f3b7a; }
    .success { background: #dff6e3; color: #176b2c; }
    .error { background: #fde2e2; color: #9f1d1d; }

    /* Popup overlay */
    #popupOverlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.45);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
      z-index: 9999;
      box-sizing: border-box;
    }

    #popupBox {
      width: 100%;
      max-width: 380px;
      background: white;
      border-radius: 18px;
      padding: 24px 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      text-align: center;
    }

    #popupTitle {
      font-size: 24px;
      font-weight: bold;
      margin-bottom: 10px;
    }

    #popupMessage {
      font-size: 18px;
      margin-bottom: 20px;
      line-height: 1.4;
    }

    .btn-wrap {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: nowrap;
    }

    button {
      flex: 1;
      font-size: 16px;
      padding: 12px 16px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      font-weight: bold;
    }

    .cancel-btn {
      background: #9f1d1d;
      color: white;
    }

    .confirm-btn {
      background: #176b2c;
      color: white;
    }

    .single-btn {
      background: #1f3b7a;
      color: white;
      width: 100%;
    }

    .hidden {
      display: none;
    }
  </style>
</head>
<body>
  <h2>Chatswood High School</h2>
  <h2>QR Check-In Scanner</h2>

  <div id="status" class="neutral">Put your QR code under the camera</div>
  <div id="reader"></div>

  <!-- Popup -->
  <div id="popupOverlay">
    <div id="popupBox">
      <div id="popupTitle">Confirm Check-In</div>
      <div id="popupMessage">Loading...</div>

      <div id="popupButtons" class="btn-wrap">
        <button class="cancel-btn" id="cancelBtn">Cancel</button>
        <button class="confirm-btn" id="confirmBtn">Check In</button>
      </div>

      <div id="popupSingleButtonWrap" class="hidden">
        <button class="single-btn" id="okBtn">OK</button>
      </div>
    </div>
  </div>

  <script>
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyRvVYUupmFYA_TqdlGwgUdpOD1vGUYV42cGplkoM8DE49kfJ0j9yDNT1Xc75sJag/exec";

    const statusBox = document.getElementById("status");
    const popupOverlay = document.getElementById("popupOverlay");
    const popupTitle = document.getElementById("popupTitle");
    const popupMessage = document.getElementById("popupMessage");
    const popupButtons = document.getElementById("popupButtons");
    const popupSingleButtonWrap = document.getElementById("popupSingleButtonWrap");
    const confirmBtn = document.getElementById("confirmBtn");
    const cancelBtn = document.getElementById("cancelBtn");
    const okBtn = document.getElementById("okBtn");

    let scanner;
    let busy = false;
    let pendingCode = "";

    function setStatus(message, type) {
      statusBox.textContent = message;
      statusBox.className = type;
    }

    function showPopup(title, message, mode = "confirm") {
      popupTitle.textContent = title;
      popupMessage.textContent = message;
      popupOverlay.style.display = "flex";

      if (mode === "confirm") {
        popupButtons.classList.remove("hidden");
        popupSingleButtonWrap.classList.add("hidden");
      } else {
        popupButtons.classList.add("hidden");
        popupSingleButtonWrap.classList.remove("hidden");
      }
    }

    function hidePopup() {
      popupOverlay.style.display = "none";
      pendingCode = "";
    }

    async function resumeScanning(delay = 1200) {
      setTimeout(async () => {
        try {
          hidePopup();
          await scanner.resume();
          setStatus("Point the camera at a QR code", "neutral");
        } catch (e) {
          setStatus("Scanner could not resume", "error");
        }
        busy = false;
      }, delay);
    }

    async function startScanner() {
      scanner = new Html5Qrcode("reader");

      try {
        const cameras = await Html5Qrcode.getCameras();
        if (!cameras || cameras.length === 0) {
          setStatus("No camera found on this device", "error");
          return;
        }

        let cameraId = cameras[0].id;
        const rear = cameras.find(c =>
          (c.label || "").toLowerCase().includes("back") ||
          (c.label || "").toLowerCase().includes("rear") ||
          (c.label || "").toLowerCase().includes("environment")
        );
        if (rear) cameraId = rear.id;

        await scanner.start(
          cameraId,
          { fps: 10, qrbox: 250 },
          onScanSuccess,
          () => {}
        );

        setStatus("Point the camera at a QR code", "neutral");
      } catch (err) {
        setStatus("Camera could not start. Check browser camera permissions.", "error");
      }
    }

    async function lookupCode(code) {
      const response = await fetch(
        APPS_SCRIPT_URL + "?mode=lookup&code=" + encodeURIComponent(code)
      );
      return await response.json();
    }

    async function checkInCode(code) {
      const response = await fetch(
        APPS_SCRIPT_URL + "?mode=checkin&code=" + encodeURIComponent(code)
      );
      return await response.json();
    }

    async function onScanSuccess(decodedText) {
      if (busy) return;
      busy = true;

      try {
        await scanner.pause(true);

        showPopup("Checking Code", "Loading...", "message");

        const result = await lookupCode(decodedText);

        if (result.success) {
          pendingCode = decodedText;
          showPopup("Confirm Check-In", `Check in ${result.name}?`, "confirm");
          setStatus("Student found", "neutral");
        } else {
          setStatus(result.name ? `${result.error} (${result.name})` : result.error, "error");
          showPopup("Error", result.name ? `${result.error} (${result.name})` : result.error, "message");
        }
      } catch (err) {
        setStatus("Could not connect to Google Sheets", "error");
        showPopup("Error", "Could not connect to Google Sheets", "message");
      }
    }

    confirmBtn.addEventListener("click", async () => {
      if (!pendingCode) return;

      try {
        showPopup("Checking In", "Loading...", "message");

        const result = await checkInCode(pendingCode);

        if (result.success) {
          setStatus("Checked in: " + result.name, "success");
          showPopup("Success", "Checked in: " + result.name, "message");
        } else {
          setStatus(result.name ? `${result.error} (${result.name})` : result.error, "error");
          showPopup("Error", result.name ? `${result.error} (${result.name})` : result.error, "message");
        }
      } catch (err) {
        setStatus("Could not complete check-in", "error");
        showPopup("Error", "Could not complete check-in", "message");
      }
    });

    cancelBtn.addEventListener("click", async () => {
      setStatus("Check-in cancelled", "error");
      showPopup("Cancelled", "Check-in cancelled", "message");
    });

    okBtn.addEventListener("click", async () => {
      await resumeScanning(300);
    });

    startScanner();
  </script>
</body>
</html>
