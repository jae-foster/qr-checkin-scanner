<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>QR Check-In Scanner</title>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 16px;
      background: #f7f7f7;
    }
    #reader {
      max-width: 420px;
      margin: 20px auto;
      background: white;
      padding: 12px;
      border-radius: 12px;
    }
    #status {
      max-width: 420px;
      margin: 16px auto;
      padding: 14px;
      border-radius: 12px;
      font-size: 18px;
      font-weight: bold;
      min-height: 28px;
    }
    .neutral { background: #e9eefb; color: #1f3b7a; }
    .success { background: #dff6e3; color: #176b2c; }
    .error { background: #fde2e2; color: #9f1d1d; }
  </style>
</head>
<body>
  <h2>QR Check-In Scanner</h2>
  <div id="status" class="neutral">Point the camera at a QR code</div>
  <div id="reader"></div>

  <script>
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyRvVYUupmFYA_TqdlGwgUdpOD1vGUYV42cGplkoM8DE49kfJ0j9yDNT1Xc75sJag/exec";
    const statusBox = document.getElementById("status");
    let scanner;
    let busy = false;

    function setStatus(message, type) {
      statusBox.textContent = message;
      statusBox.className = type;
    }

    async function startScanner() {
      scanner = new Html5Qrcode("reader");

      try {
        const cameras = await Html5Qrcode.getCameras();
        if (!cameras || cameras.length === 0) {
          setStatus("No camera found on this device", "error");
          return;
        }

        let cameraId = cameras[0].id;
        const rear = cameras.find(c =>
          (c.label || "").toLowerCase().includes("back") ||
          (c.label || "").toLowerCase().includes("rear") ||
          (c.label || "").toLowerCase().includes("environment")
        );
        if (rear) cameraId = rear.id;

        await scanner.start(
          cameraId,
          { fps: 10, qrbox: 250 },
          onScanSuccess,
          () => {}
        );

        setStatus("Point the camera at a QR code", "neutral");
      } catch (err) {
        setStatus("Camera could not start. Check browser camera permissions.", "error");
      }
    }

    async function onScanSuccess(decodedText) {
      if (busy) return;
      busy = true;

      try {
        await scanner.pause(true);

        const response = await fetch(
          APPS_SCRIPT_URL + "?mode=checkin&code=" + encodeURIComponent(decodedText)
        );
        const result = await response.json();

        if (result.success) {
          setStatus("Checked in: " + result.name, "success");
        } else if (result.name) {
          setStatus(result.error + " (" + result.name + ")", "error");
        } else {
          setStatus(result.error, "error");
        }
      } catch (err) {
        setStatus("Could not connect to Google Sheets", "error");
      }

      setTimeout(async () => {
        try {
          await scanner.resume();
          setStatus("Point the camera at a QR code", "neutral");
        } catch (e) {
          setStatus("Scanner could not resume", "error");
        }
        busy = false;
      }, 1800);
    }

    startScanner();
  </script>
</body>
</html>
